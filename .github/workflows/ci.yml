name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: es_user
          POSTGRES_PASSWORD: es_password
          POSTGRES_DB: estimation_studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://es_user:es_password@localhost:5432/estimation_studio_test
      JWT_SECRET: ci-test-secret
      CORS_ORIGIN: http://localhost:5000
      # NODE_ENV is NOT 'development' in CI, so runMigrations() fires automatically on initializeDatabase().
      # The explicit db:migrate step below is a belt-and-suspenders second pass + acceptance check.
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install apt deps for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates fonts-liberation gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 \
            libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 \
            libpango-1.0-0 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 \
            libxrandr2 libxrender1 libxss1 libxtst6 libappindicator3-1 xdg-utils wget

      - name: Install dependencies
        run: npm ci

      - name: Build engine (required for web/server typecheck)
        run: npm run build --workspace packages/engine

      # ── Typecheck gates (fail-fast before any tests) ──────────────────────
      - name: Typecheck server
        run: npm run typecheck --workspace packages/server

      - name: Typecheck web
        run: npm run typecheck --workspace packages/web

      - name: Go-live env gate (schema)
        env:
          DATABASE_URL: postgresql://es_user:es_password@localhost:5432/estimation_studio_test
          JWT_SECRET: ci-test-secret
          CORS_ORIGIN: http://localhost:5000
          ES_PUBLIC_URL: http://localhost:5000
          ES_SSO_SECRET: ci-es-sso-secret
        run: npm run validate:go-live-env --workspace packages/server

      - name: Ultra audit offline smoke (process-fork + M&O + slabs)
        run: npm run smoke:ultra-gates --workspace packages/server

      # ── Database: migrate only (no db:push, no db:patch) ──────────────────
      # This is the Phase 1 acceptance criterion: a fresh DB must be fully
      # provisioned by db:migrate alone — no manual patching needed.
      - name: Run migrations (fresh DB)
        run: npm run db:migrate --workspace packages/server

      - name: Migration acceptance test (idempotency + completeness)
        run: npm run test:migration --workspace packages/server

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Engine tests (34/34)
        run: npm run test --workspace packages/engine

      - name: Server tests (37/37)
        run: npm run test --workspace packages/server

      - name: Generate sample PDF
        run: npm run pdf:test --workspace packages/server
        continue-on-error: true   # PDF test needs puppeteer; non-fatal in CI
