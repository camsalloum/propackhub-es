# Dedicated ES PostgreSQL on camai — separate from pph-postgres (:5432) and fs-postgres (:5433).
# Host port 5434 avoids conflicts with PPH and FS Docker PG instances.
services:
  es-postgres:
    image: postgres:16-alpine
    container_name: es-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: es_app
      POSTGRES_PASSWORD: ${ES_POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: estimation_studio
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - es_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U es_app -d estimation_studio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  es_pgdata:
