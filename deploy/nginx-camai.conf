# nginx site for es.propackhub.com on camai (Cloudflare Tunnel → :8091 or :80).
# Install (deferred — run on camai when ES goes live):
#   sudo cp deploy/nginx-camai.conf /etc/nginx/conf.d/es-propackhub.conf
#   sudo nginx -t && sudo nginx -s reload

upstream es_api {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 8091;
    listen [::]:8091;
    server_name es.propackhub.com;

    root /home/camai/propackhub-es/current/packages/web/dist;
    index index.html;

    access_log /var/log/nginx/es-propackhub.access.log;
    error_log /var/log/nginx/es-propackhub.error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
        proxy_pass http://es_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /health/ready {
        proxy_pass http://es_api/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://es_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    # Platform SSO hand-off (skeleton; nginx + callback wiring deferred on camai)
    location /auth/ {
        proxy_pass http://es_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
}
