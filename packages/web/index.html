<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      Baseline CSP for the SPA. script-src allows 'unsafe-inline' for the pre-paint
      theme bootstrap below; tighten further when that moves to an external file.
      connect-src covers Vite HMR (ws) and the local API in dev.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https:; base-uri 'self'; form-action 'self'; object-src 'none';"
    />
    <script>
      // Pre-paint resolver: applies theme + density + reduced-motion BEFORE the
      // first contentful paint so the painted UI matches the persisted prefs.
      // localStorage on web; Capacitor's localStorage mirror keeps native in sync
      // (the @capacitor/preferences-backed PreferenceStore mirrors writes here).
      (function () {
        try {
          var THEME_KEY = 'es.theme';
          var DENSITY_KEY = 'es.density';
          var VALID_THEMES = ['light', 'dark', 'lagoon', 'ocean', 'aurora', 'midnight', 'forest', 'frost', 'classic'];
          var VALID_DENSITY = ['auto', 'comfortable', 'compact', 'spacious'];

          // Theme
          var t = localStorage.getItem(THEME_KEY);
          if (VALID_THEMES.indexOf(t) === -1) {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;

          // Density: one-time migrate to Auto (v2) so laptop users are not stuck on
          // the old Comfortable default. After that, respect the user's choice.
          if (!localStorage.getItem('es.density.v2')) {
            localStorage.setItem(DENSITY_KEY, 'auto');
            localStorage.setItem('es.density.v2', '1');
          }
          var d = localStorage.getItem(DENSITY_KEY);
          if (VALID_DENSITY.indexOf(d) === -1) {
            d = 'auto';
          }
          var applied = d;
          if (d === 'auto') {
            applied = matchMedia('(max-width: 1535px)').matches ? 'compact' : 'comfortable';
          }
          document.documentElement.dataset.density = applied;

          // Reduced motion mirror
          if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.documentElement.dataset.reducedMotion = 'true';
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.dataset.density =
            matchMedia('(max-width: 1535px)').matches ? 'compact' : 'comfortable';
        }
      })();
    </script>
    <title>ProPackHub Estimation Studio</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a2744">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Variable fonts: Inter and DM Sans expose continuous weight + optical-size
      axes. Loading the full variable file unlocks weights like 438 / 615 for
      typographic fine-tuning, OpenType stylistic sets (ss01, cv11), and proper
      tabular-nums — at roughly the same network cost as 3-4 static weights.
      JetBrains Mono kept for code/numerics.
    -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
